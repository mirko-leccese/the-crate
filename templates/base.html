<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}The Crate{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Mobile top bar (hidden on desktop) -->
  <header class="mobile-topbar">
    <a href="{{ url_for('index') }}" class="mobile-topbar__brand">The Crate</a>
    <button class="mobile-topbar__toggle" id="navToggle" aria-label="Apri menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <a href="{{ url_for('index') }}" class="sidebar__brand">The Crate</a>
    </div>
    <ul class="sidebar__nav">
      <li>
        <a href="{{ url_for('index') }}"
           class="sidebar__link {% if request.endpoint == 'index' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg>
          Home
        </a>
      </li>
      <li>
        <a href="{{ url_for('top_albums') }}"
           class="sidebar__link {% if request.endpoint == 'top_albums' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2.2"/><circle cx="8" cy="8" r="0.6" fill="currentColor" stroke="none"/></svg>
          Archivio
        </a>
      </li>
      <li>
        <a href="{{ url_for('search') }}"
           class="sidebar__link {% if request.endpoint == 'search' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
          Cerca
        </a>
      </li>
      <li>
        <a href="{{ url_for('random_albums') }}"
           class="sidebar__link {% if request.endpoint == 'random_albums' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4.5h2a4 4 0 0 1 3 1.5l2 2a4 4 0 0 0 3 1.5h2"/><path d="M1 11.5h2a4 4 0 0 0 3-1.5l.5-.5"/><path d="M8.5 5l1.5-1.5a4 4 0 0 1 3-1.5h2"/><polyline points="12.5,1.5 15,4 12.5,6.5"/><polyline points="12.5,9 15,11.5 12.5,14"/></svg>
          Random!
        </a>
      </li>
      <li>
        <a href="{{ url_for('perche') }}"
           class="sidebar__link {% if request.endpoint == 'perche' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><line x1="8" y1="7.5" x2="8" y2="11"/><circle cx="8" cy="5.5" r="0.6" fill="currentColor" stroke="none"/></svg>
          Perché?
        </a>
      </li>
    </ul>
  </nav>

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    const toggle = document.getElementById('navToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    function closeSidebar() {
      sidebar.classList.remove('sidebar--open');
      overlay.classList.remove('sidebar-overlay--visible');
    }

    toggle.addEventListener('click', () => {
      sidebar.classList.toggle('sidebar--open');
      overlay.classList.toggle('sidebar-overlay--visible');
    });
    overlay.addEventListener('click', closeSidebar);
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
