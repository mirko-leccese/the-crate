<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}The Crate{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Mobile top bar (hidden on desktop) -->
  <header class="mobile-topbar">
    <a href="{{ url_for('index') }}" class="mobile-topbar__brand">The Crate</a>
    <button class="mobile-topbar__toggle" id="navToggle" aria-label="Apri menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <a href="{{ url_for('index') }}" class="sidebar__brand">The Crate</a>
    </div>
    <ul class="sidebar__nav">
      <li>
        <a href="{{ url_for('index') }}"
           class="sidebar__link {% if request.endpoint == 'index' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg>
          Home
        </a>
      </li>
      <li>
        <a href="{{ url_for('search') }}"
           class="sidebar__link {% if request.endpoint == 'search' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
          Cerca
        </a>
      </li>
      <li>
        <a href="{{ url_for('random_albums') }}"
           class="sidebar__link {% if request.endpoint == 'random_albums' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4.5h2a4 4 0 0 1 3 1.5l2 2a4 4 0 0 0 3 1.5h2"/><path d="M1 11.5h2a4 4 0 0 0 3-1.5l.5-.5"/><path d="M8.5 5l1.5-1.5a4 4 0 0 1 3-1.5h2"/><polyline points="12.5,1.5 15,4 12.5,6.5"/><polyline points="12.5,9 15,11.5 12.5,14"/></svg>
          Random!
        </a>
      </li>
      <li>
        <a href="{{ url_for('stats') }}"
           class="sidebar__link {% if request.endpoint == 'stats' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="9" width="3" height="6" rx="0.5"/><rect x="6.5" y="5" width="3" height="10" rx="0.5"/><rect x="11" y="1" width="3" height="14" rx="0.5"/></svg>
          Stats
        </a>
      </li>
      <li>
        <a href="{{ url_for('perche') }}"
           class="sidebar__link {% if request.endpoint == 'perche' %}sidebar__link--active{% endif %}">
          <svg class="sidebar__icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><line x1="8" y1="7.5" x2="8" y2="11"/><circle cx="8" cy="5.5" r="0.6" fill="currentColor" stroke="none"/></svg>
          Perché?
        </a>
      </li>
    </ul>
  </nav>

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    const toggle = document.getElementById('navToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    function closeSidebar() {
      sidebar.classList.remove('sidebar--open');
      overlay.classList.remove('sidebar-overlay--visible');
    }

    toggle.addEventListener('click', () => {
      sidebar.classList.toggle('sidebar--open');
      overlay.classList.toggle('sidebar-overlay--visible');
    });
    overlay.addEventListener('click', closeSidebar);
  </script>

  <script>
    // _dzJsonp — lightweight JSONP loader for Deezer API calls.
    // Deezer does not support CORS for browser requests, so JSONP is required.
    // Each call gets a unique global callback name to allow multiple concurrent
    // requests (e.g. multiple cards visible at once on Archivio).
    function _dzJsonp(url, cb) {
      var name = 'dz_' + Math.random().toString(36).slice(2, 10);
      var script = document.createElement('script');
      var timer = setTimeout(function() {
        delete window[name];
        if (script.parentNode) script.parentNode.removeChild(script);
        cb(null);
      }, 6000);
      window[name] = function(data) {
        clearTimeout(timer);
        delete window[name];
        if (script.parentNode) script.parentNode.removeChild(script);
        cb(data);
      };
      script.src = url + '&callback=' + name;
      document.head.appendChild(script);
    }

    // _previewSetUnavailable — marks the container as unavailable.
    // The audio placeholder is hidden via CSS and a "non disponibile" message
    // is shown in its place at the same height — no layout shift.
    function _previewSetUnavailable(container) {
      container.classList.remove('preview-audio-container--loading');
      container.classList.add('preview-audio-container--unavailable');
    }

    // fetchPreview — client-side Deezer album search via JSONP.
    // Step 1: search for the album to get its Deezer album ID.
    // Step 2: fetch that album's track list and take the first track's preview URL.
    // Called when the card enters the viewport (IntersectionObserver below).
    // data-preview-fetched guards against repeat calls on re-enter.
    // On success: sets src on the pre-rendered <audio> placeholder in-place (no layout shift).
    // On failure: transitions the placeholder to an "unavailable" state (same dimensions).
    function fetchPreview(card) {
      if (!card || card.dataset.previewFetched === 'true') return;
      card.dataset.previewFetched = 'true';

      var container = card.querySelector('.preview-audio-container');
      if (!container) return;

      var artist = container.dataset.deezerArtist;
      var album  = container.dataset.deezerAlbum;
      if (!artist || !album) { _previewSetUnavailable(container); return; }

      var q = 'artist:"' + artist + '" album:"' + album + '"';
      _dzJsonp(
        'https://api.deezer.com/search/album?q=' + encodeURIComponent(q) + '&limit=1&output=jsonp',
        function(res) {
          if (!res || !res.data || !res.data[0]) { _previewSetUnavailable(container); return; }
          var albumId = res.data[0].id;
          _dzJsonp(
            'https://api.deezer.com/album/' + albumId + '/tracks?output=jsonp',
            function(tracks) {
              if (!tracks || !tracks.data || !tracks.data[0]) { _previewSetUnavailable(container); return; }
              var bestTrack = (container.dataset.deezerBestTrack || '').toLowerCase().trim();
              var matched = null;
              if (bestTrack) {
                // 1. Case-insensitive exact match
                matched = tracks.data.find(function(t) { return t.title.toLowerCase().trim() === bestTrack; });
                // 2. Case-insensitive includes fallback
                if (!matched) {
                  matched = tracks.data.find(function(t) { return t.title.toLowerCase().includes(bestTrack) || bestTrack.includes(t.title.toLowerCase().trim()); });
                }
              }
              var previewUrl = matched ? matched.preview : tracks.data[0].preview;
              if (!previewUrl) { _previewSetUnavailable(container); return; }
              // Update the pre-rendered placeholder in-place — no new element, no layout shift.
              var audio = container.querySelector('audio');
              audio.src = previewUrl;
              container.classList.remove('preview-audio-container--loading');
            }
          );
        }
      );
    }

    // Trigger fetchPreview lazily when a card scrolls into view (one-shot per card).
    var _previewObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        _previewObserver.unobserve(entry.target);
        fetchPreview(entry.target);
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.album-card').forEach(function(card) {
      _previewObserver.observe(card);
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
